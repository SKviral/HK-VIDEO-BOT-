<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamX Video Portal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #0f0f15;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .header {
            width: 100%;
            padding: 20px 15px;
            text-align: center;
            background: linear-gradient(135deg, #1a1a24 0%, #0f0f15 100%);
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid #2a2a3a;
        }
        .header h1 { font-size: 18px; font-weight: 600; color: #ff4080; }
        .video-list {
            width: 100%;
            max-width: 450px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 50px;
        }
        .video-card {
            background: #1a1a24;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.2s;
        }
        .video-card:active { transform: scale(0.98); }
        .thumb-container {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background-color: #000;
        }
        .thumb-container img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
        }
        .video-info { padding: 15px; }
        .video-title { font-size: 16px; font-weight: 600; margin-bottom: 5px; }
        .video-meta { font-size: 12px; color: #888; display: flex; gap: 15px; flex-wrap: wrap;}
        .video-meta span { display: flex; align-items: center; gap: 4px; }
        
        .unlock-section {
            padding: 15px;
            background: #15151e;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .unlock-btn {
            background: linear-gradient(90deg, #ff4080, #e91e63);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: transform 0.2s;
        }
        .unlock-btn:active { transform: scale(0.98); }
        .unlock-btn.unlocked { background: linear-gradient(90deg, #00c6ff, #0072ff); }
        .play-btn {
            background: #ffffff;
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            display: block;
        }
        .loader {
            text-align: center;
            padding: 50px;
            color: #888;
        }
        .back-btn {
            background: transparent;
            border: 1px solid #444;
            color: #fff;
            padding: 8px 15px;
            border-radius: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            font-size: 14px;
            align-self: flex-start;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>StreamX Video Portal</h1>
    </div>
    
    <div id="content" class="video-list loader">Loading videos...</div>

    <script>
        // Firebase ডেটাবেস URL
        const FIREBASE_DB_URL = "https://telegram-bot-ca2a6-default-rtdb.firebaseio.com/videos";
        const tg = window.Telegram.WebApp;
        if (tg) tg.expand();

        let currentVideoId = tg && tg.initDataUnsafe && tg.initDataUnsafe.start_param;
        if (!currentVideoId) {
            const urlParams = new URLSearchParams(window.location.search);
            currentVideoId = urlParams.get('id') || urlParams.get('startapp');
        }

        const contentDiv = document.getElementById('content');

        // ভিডিও লিস্ট পেজ লোড করার ফাংশন
        function loadVideoList() {
            contentDiv.innerHTML = '<div class="loader">Loading videos...</div>';
            // orderBy সরিয়ে সব ভিডিও লোড করা হচ্ছে
            fetch(`${FIREBASE_DB_URL}.json`)
            .then(res => res.json())
            .then(data => {
                if (!data) {
                    contentDiv.innerHTML = '<div class="loader">No videos found!</div>';
                    return;
                }
                
                // ভিডিওগুলোকে অ্যারেতে রূপান্তর করে সময় অনুযায়ী সাজানো হচ্ছে (নতুনগুলো উপরে)
                const videos = Object.entries(data).sort((a, b) => {
                    const timeA = a[1].timestamp || 0;
                    const timeB = b[1].timestamp || 0;
                    return timeB - timeA;
                });

                let html = '';
                videos.forEach(([id, v]) => {
                    html += `
                        <div class="video-card" onclick="openVideo('${id}')">
                            <div class="thumb-container">
                                <img src="${v.thumb || 'https://via.placeholder.com/450x250'}" alt="Thumbnail">
                            </div>
                            <div class="video-info">
                                <div class="video-title">${v.title || 'Untitled Video'}</div>
                                <div class="video-meta">
                                    <span>👁️ ${v.views || 0} views</span>
                                    <span>❤️ ${v.likes || 0} likes</span>
                                    <span>📂 ${v.category || 'Others'}</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
                contentDiv.innerHTML = html || '<div class="loader">No videos found!</div>';
            })
            .catch(err => {
                contentDiv.innerHTML = '<div class="loader">Error loading videos.</div>';
            });
        }

        // একক ভিডিও পেজ লোড করার ফাংশন
        function openVideo(videoId) {
            contentDiv.innerHTML = '<div class="loader">Loading video...</div>';
            fetch(`${FIREBASE_DB_URL}/${videoId}.json`)
            .then(res => res.json())
            .then(video => {
                if (!video) {
                    contentDiv.innerHTML = '<div class="loader">Video not found!</div>';
                    return;
                }

                let adsNeeded = video.fullCollectionAds || 1; // এখানে ফায়ারবেস থেকে অ্যাড সংখ্যা আসছে
                let adsWatched = 0;
                let videoUrl = video.url || "#"; 

                contentDiv.innerHTML = `
                    <button class="back-btn" onclick="loadVideoList()">🔙 Back to List</button>
                    <div class="video-card" style="cursor: default;">
                        <div class="thumb-container">
                            <img src="${video.thumb || 'https://via.placeholder.com/450x250'}" alt="Thumbnail">
                        </div>
                        <div class="video-info">
                            <div class="video-title">${video.title || 'Untitled Video'}</div>
                            <div class="video-meta">
                                <span>👁️ ${video.views || 0} views</span>
                                <span>❤️ ${video.likes || 0} likes</span>
                                <span>📂 ${video.category || 'Others'}</span>
                            </div>
                        </div>
                        <div class="unlock-section">
                            <button id="unlockBtn" class="unlock-btn">UNLOCK — 0/${adsNeeded} ADS</button>
                            <div id="playArea"></div>
                        </div>
                    </div>
                `;

                const unlockBtn = document.getElementById('unlockBtn');
                const playArea = document.getElementById('playArea');

                unlockBtn.onclick = () => {
                    if (adsWatched < adsNeeded) {
                        // এখানে অ্যাড লিংক ওপেন হবে (ভিডিওর url বা শর্ট লিংক)
                        window.open(videoUrl, '_blank'); 
                        adsWatched++;
                        unlockBtn.innerText = `UNLOCK — ${adsWatched}/${adsNeeded} ADS`;

                        if (adsWatched === adsNeeded) {
                            unlockBtn.classList.add('unlocked');
                            unlockBtn.innerText = "✅ UNLOCKED";
                            // ভিডিও আনলক হওয়ার পর ডাউনলোড/ওয়াচ বাটন দেখানো
                            playArea.innerHTML = `<a href="${videoUrl}" target="_blank" class="play-btn">▶️ Watch / Download Now</a>`;
                        }
                    }
                };
            })
            .catch(err => {
                contentDiv.innerHTML = '<div class="loader">Error loading data.</div>';
            });
        }

        // পেজ লোড হলে কী দেখাবে তার লজিক
        if (currentVideoId) {
            openVideo(currentVideoId);
        } else {
            loadVideoList();
        }
    </script>
</body>
</html>
